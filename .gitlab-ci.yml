stages:
  - test
  - deploy

include:
# n8n — n8n + postgres on dev-1; 3 postgres secrets via envsubst from GITLAB_POSTGRES_*
  - component: $CI_SERVER_FQDN/components/docker/validate-compose@~latest
    inputs:
      as: "lint-n8n"
      local_path: "deployments/n8n"
  - component: $CI_SERVER_FQDN/components/docker/deploy-compose@~latest
    inputs:
      as: "deploy-n8n"
      environment: "dev-1"                          # host derives to dev-1-vm.margusm.dev
      local_path: "deployments/n8n"
      remote_path: "deployments/n8n-dev-1-vm-1"     # unchanged host dir → in-place update
      substitute_vars: '$GITLAB_POSTGRES_DB $GITLAB_POSTGRES_USER $GITLAB_POSTGRES_PASSWORD'
